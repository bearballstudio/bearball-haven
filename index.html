<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="肉丸七的避風港，收藏角色故事、圖像與溫柔觀察的小小角落。" />
  <title>肉丸七的避風港</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #fff9f0;
      --surface: #ffffff;
      --surface-soft: #efebe9;
      --text: #5d4037;
      --text-soft: #6d4c41;
      --text-muted: #9e9e9e;
      --accent: #d84315;
      --accent-soft: #ffccbc;
      --footer: #5d4037;
      --shadow: 0 8px 24px rgba(141, 110, 99, 0.08);
      --shadow-hover: 0 12px 30px rgba(141, 110, 99, 0.14);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max-width: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.6;
    }

    a {
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
      -webkit-user-drag: none;
      user-select: none;
    }

    header {
      width: 100%;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--surface-soft);
      padding: 14px 0;
    }

    .header-container {
      width: 90%;
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }

    .logo:hover {
      opacity: 0.9;
    }

    nav.filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: white;
      border: 1.5px solid var(--accent-soft);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.25s ease;
    }

    button:hover {
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    main {
      width: 90%;
      max-width: var(--max-width);
      min-height: 80vh;
      padding: 36px 0 12px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.3;
    }

    .page-subtitle {
      margin: 0 0 22px;
      color: var(--text-soft);
      font-size: 15px;
    }

    #content.grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      width: 100%;
      margin-top: 12px;
    }

    #content.single {
      display: block;
      width: 100%;
    }

    .post-card {
      background: var(--surface);
      border: 2px solid var(--surface-soft);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      cursor: pointer;
      min-height: 100%;
    }

    .post-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--surface-soft);
      border-radius: var(--radius-md);
      margin-bottom: 15px;
      overflow: hidden;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .img-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 16px;
      text-align: center;
    }

    .tag,
    .category-link {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      transition: all 0.2s ease;
    }

    .tag {
      background: var(--accent-soft);
      color: var(--accent);
      margin-bottom: 10px;
      align-self: flex-start;
    }

    .tag:hover,
    .category-link:hover {
      background: var(--accent);
      color: #fff;
    }

    .category-link {
      background: var(--surface-soft);
      color: var(--text-soft);
    }

    h2 {
      font-size: 20px;
      margin: 0 0 10px;
      line-height: 1.4;
      color: var(--text);
    }

    p {
      margin: 0 0 15px;
      font-size: 15px;
      color: var(--text-soft);
    }

    .post-excerpt {
      flex-grow: 1;
    }

    small {
      color: var(--text-muted);
      font-size: 12px;
    }

    .post-detail {
      max-width: 860px;
      background: var(--surface);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      margin: 0 auto;
      animation: fadeIn 0.35s ease;
    }

    .post-detail h1 {
      margin-top: 8px;
      margin-bottom: 18px;
      line-height: 1.35;
    }

    .post-meta {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
      margin-bottom: 18px;
    }

    .full-content {
      white-space: pre-wrap;
      line-height: 2;
      font-size: 18px;
      color: var(--text);
      word-break: break-word;
    }

    .status-box {
      grid-column: 1 / -1;
      text-align: center;
      background: white;
      border: 1px solid var(--surface-soft);
      padding: 24px;
      border-radius: 18px;
      color: var(--text-soft);
      box-shadow: var(--shadow);
    }

    .about-content {
      line-height: 2;
      font-size: 16px;
      color: var(--text);
    }

    hr {
      margin: 30px 0;
      border: 0;
      border-top: 1px solid var(--surface-soft);
    }

    footer {
      width: 100%;
      background: var(--footer);
      color: #fff9f0;
      padding: 40px 0;
      text-align: center;
      margin-top: 50px;
    }

    .footer-content p {
      color: #efebe9;
      font-size: 14px;
      margin: 5px 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      #content.grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      #content.grid {
        grid-template-columns: 1fr;
      }

      .header-container {
        flex-direction: column;
        align-items: flex-start;
      }

      .post-detail {
        padding: 24px;
      }

      .page-title {
        font-size: 24px;
      }

      .full-content {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <button class="logo" onclick="fetchPosts()" aria-label="回到肉丸七的避風港首頁">
        肉丸七的避風港
      </button>

      <nav class="filter-group" aria-label="主要導覽">
        <button onclick="fetchPosts()">避風港首頁</button>
        <button onclick="showAboutPage()">關於肉丸七</button>
      </nav>
    </div>
  </header>

  <main>
    <h1 class="page-title">肉丸七的避風港</h1>
    <p class="page-subtitle">收藏角色、故事與溫柔觀察的小小角落。</p>
    <section id="content" class="grid" aria-live="polite">
      <div class="status-box">載入中，請稍候……</div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p>© 2026 Bearball Studio 肉丸宮</p>
      <p>讓呼吸變溫柔的力量</p>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://xuxksgybxxhdpxzhldho.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGtzZ3lieHhoZHB4emhsZGhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzY0NjcsImV4cCI6MjA4ODM1MjQ2N30.ggWf5cUXj3Q4-kvF25TgVBVqhnthgZhob8o_KnApN7s";
    const ABOUT_IMAGE = "https://xuxksgybxxhdpxzhldho.supabase.co/storage/v1/object/public/bearball-images/20250811_House5.jpg";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const contentDiv = document.getElementById("content");

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function isSafeImageUrl(url) {
      if (!url || typeof url !== "string") return false;
      try {
        const parsed = new URL(url, window.location.origin);
        return ["http:", "https:"].includes(parsed.protocol);
      } catch {
        return false;
      }
    }

    function renderImage(url, altText = "") {
      const safeAlt = escapeHtml(altText || "圖片");
      if (!isSafeImageUrl(url)) {
        return `
          <div class="img-fallback" aria-label="目前沒有圖片">
            目前沒有圖片
          </div>
        `;
      }
      return `<img src="${url}" alt="${safeAlt}" loading="lazy" referrerpolicy="no-referrer" />`;
    }

    function setGridMode() {
      contentDiv.className = "grid";
    }

    function setSingleMode() {
      contentDiv.className = "single";
    }

    function renderStatus(message) {
      setGridMode();
      contentDiv.innerHTML = `<div class="status-box">${escapeHtml(message)}</div>`;
    }

    function safeText(value, fallback = "") {
      if (value === null || value === undefined || value === "") return fallback;
      return escapeHtml(value);
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("zh-Hant", {
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(date);
    }

    async function fetchPosts(categoryName = null, moodName = null) {
      renderStatus("正在整理避風港……");

      let query = supabaseClient.from("posts").select("*");

      if (categoryName) query = query.eq("category", categoryName);
      if (moodName) query = query.eq("mood_status", moodName);

      const { data, error } = await query.order("created_at", { ascending: false });

      if (error) {
        renderStatus("目前無法讀取內容，請稍後再試。");
        console.error("fetchPosts error:", error);
        return;
      }

      if (!data || data.length === 0) {
        renderStatus("目前避風港還在整理中，請稍後再來看看。");
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      setGridMode();
      contentDiv.innerHTML = data.map(post => {
        const title = safeText(post.title, "未命名文章");
        const subject = safeText(post.subject, "");
        const mood = safeText(post.mood_status, "日常");
        const imageAlt = post.title ? `${post.title} 封面圖片` : "文章封面圖片";

        return `
          <article class="post-card" onclick="showDetail('${String(post.id).replace(/'/g, "\\'")}')">
            <div class="img-container">
              ${renderImage(post.cover_image, imageAlt)}
            </div>
            <a href="#" class="tag" onclick="filterEvent(event, null, '${String(post.mood_status || "").replace(/'/g, "\\'")}')">#${mood}</a>
            <h2>${title}</h2>
            <p class="post-excerpt">${subject}</p>
            <small>點擊展開全文 →</small>
          </article>
        `;
      }).join("");

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showAboutPage() {
      setSingleMode();
      contentDiv.innerHTML = `
        <article class="post-detail">
          <h1>關於肉丸七</h1>
          <div class="img-container">
            ${renderImage(ABOUT_IMAGE, "肉丸七主視覺")}
          </div>
          <div class="about-content">
            <p>在一個看似平凡、卻充滿想像力的世界裡，誕生了一群圓潤可愛、帶著幽默哲思的角色——這裡，就是「肉丸宮」。</p>
            <p>肉丸宮，是「肉丸小熊們的所在之地」。它不僅是一個角色世界觀，更是一個承載創意、情感與觀察的內容宇宙。透過角色設計、幽默語錄與日常感知的交織，以簡潔卻富有層次的表現方式，傳遞一種輕盈而不流於空洞的觀看體驗。</p>
            <p>而這個世界的起點，是「肉丸七」。</p>
            <p>作為肉丸宮的第一位誕生角色，肉丸七同時也是整個創作宇宙的敘事核心。他以第一人稱的視角觀察世界，用略帶天真卻意外精準的語氣，道出那些看似荒謬、卻直指人心的片刻。時而搗蛋，時而靜默，他不試圖解釋世界，而是陪伴觀者重新感受世界。</p>
            <p>隨著肉丸七的出現，其他角色也逐漸加入——Boo、Bubble、Rabbit，以及更多尚未被命名的朋友們，一同生活在肉丸宮之中。他們各自擁有不同的性格與節奏，卻共享一種純粹的快樂：搖擺、跳動，並以自己的方式理解生活。</p>
            <p>值得一提的是，肉丸宮與肉丸七的創作，並非出自專業 3D 設計師之手。這些角色與畫面，也許不以技術的精緻見長，卻承載著創作者最直接而真誠的心意。</p>
            <p>在一次次嘗試與學習之中，這些略帶稚拙的形狀與表情，逐漸形成了屬於肉丸宮的獨特語言——不完美，但真實；不複雜，卻溫暖。</p>
            <p>而這個網站本身，也仍在持續摸索與學習之中，隨著創作的累積，一點一滴地被塑造與完善。</p>
            <p>肉丸宮的創作核心，不在於宏大的敘事，而在於那些微小卻真實的感受。透過角色、圖像與文字的融合，它持續探索一件簡單卻重要的事——在複雜的世界裡，如何保留一點輕鬆與幽默。</p>
            <p>而答案，或許就藏在肉丸七的一句話之中。</p>
          </div>
          <button onclick="fetchPosts()" style="margin-top:30px;">返回首頁</button>
        </article>
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function filterEvent(event, category, mood) {
      event.preventDefault();
      event.stopPropagation();
      fetchPosts(category, mood);
    }

    async function showDetail(postId) {
      setSingleMode();
      contentDiv.innerHTML = `<div class="status-box">正在打開這篇文章……</div>`;

      const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .eq("id", postId)
        .single();

      if (error || !data) {
        contentDiv.innerHTML = `
          <div class="status-box">
            目前無法讀取這篇文章，請稍後再試。
            <div style="margin-top:16px;">
              <button onclick="fetchPosts()">返回列表</button>
            </div>
          </div>
        `;
        console.error("showDetail error:", error);
        return;
      }

      const title = safeText(data.title, "未命名文章");
      const mood = safeText(data.mood_status, "日常");
      const content = safeText(data.content, "");
      const category = safeText(data.category, "未分類");
      const dateText = formatDate(data.created_at);
      const imageAlt = data.title ? `${data.title} 封面圖片` : "文章封面圖片";

      contentDiv.innerHTML = `
        <article class="post-detail">
          <button onclick="backToList()" style="margin-bottom:20px;">← 返回列表</button>

          <div class="img-container" style="border-radius: 20px; margin-bottom: 30px;">
            ${renderImage(data.cover_image, imageAlt)}
          </div>

          <a href="#" class="tag" onclick="filterEvent(event, null, '${String(data.mood_status || "").replace(/'/g, "\\'")}')">#${mood}</a>

          <h1>${title}</h1>

          ${dateText ? `<div class="post-meta">發布時間：${escapeHtml(dateText)}</div>` : ""}

          <div class="full-content">${content}</div>

          <hr />

          <p style="font-size: 14px; color: #9e9e9e;">
            探索更多：
            <a href="#" class="category-link" onclick="filterEvent(event, '${String(data.category || "").replace(/'/g, "\\'")}', null)">
              ${category}
            </a>
          </p>
        </article>
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function backToList() {
      fetchPosts();
    }

    fetchPosts();
  </script>
</body>
</html>
